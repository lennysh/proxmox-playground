# ProxMox Docker ZVol Configuration
# 
# Format: <container_id> <pool> <zvol_name> <size> [optional_notes]
#
# Lines starting with # are comments
# Empty lines are ignored
#
# Container ID: Numeric ProxMox LXC container ID
# Pool: ZFS pool name (e.g., rpool, tank)
# ZVol Name: Name for the zvol (alphanumeric, underscore, hyphen only)
# Size: Size in standard format (30G, 1T, 500M, etc.)
# Notes: Optional description (for reference only)

# Production Stacks
100 rpool docker_api_prod 50G Production API microservice
101 rpool docker_postgres_prod 200G PostgreSQL production database
102 rpool docker_cache_prod 10G Redis production cache

# Development Environment
103 rpool docker_dev_stack 30G Development multi-service stack

# CI/CD Pipeline
104 rpool docker_cicd 100G CI/CD build system and artifact cache

# Monitoring Stack
105 rpool docker_monitoring 25G Prometheus, Grafana, AlertManager

# Testing Environment
106 rpool docker_testing 40G QA and integration testing environment
